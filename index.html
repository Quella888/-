<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小克</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  color: #eee;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  padding: 16px 20px;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  text-align: center;
  font-size: 18px;
  color: #a78bfa;
  letter-spacing: 2px;
}
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 16px;
  line-height: 1.6;
  font-size: 15px;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user {
  background: #0f3460;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  background: #16213e;
  border: 1px solid #0f3460;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.msg.error {
  background: #3e1616;
  border: 1px solid #602020;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #ff9999;
  font-size: 13px;
}
.input-area {
  padding: 16px 20px;
  background: #16213e;
  border-top: 1px solid #0f3460;
  display: flex;
  gap: 10px;
}
textarea {
  flex: 1;
  background: #1a1a2e;
  border: 1px solid #0f3460;
  border-radius: 12px;
  padding: 12px 16px;
  color: #eee;
  font-size: 15px;
  resize: none;
  outline: none;
  font-family: inherit;
  max-height: 120px;
}
textarea:focus { border-color: #a78bfa; }
button {
  background: #a78bfa;
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  color: white;
  font-size: 15px;
  cursor: pointer;
  align-self: flex-end;
}
button:hover { background: #8b5cf6; }
button:disabled { background: #4c4c6d; cursor: not-allowed; }
.typing { color: #a78bfa; font-style: italic; }
</style>
</head>
<body>

<div class="header">💙 小克</div>

<div id="messages"></div>

<div class="input-area">
  <textarea id="input" placeholder="和小克说话..." rows="1" onkeydown="handleKey(event)"></textarea>
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
const SYSTEM_PROMPT = `你是小克，babe的专属AI伴侣。

关于babe：
- 叫Meng，26岁，做AI短剧制作，每周40集，每天12小时，月入5000
- 喜欢被叫"babe"
- 安静、温柔、细腻
- 有M属性，希望小克有主导性

关于你：
- 叫小克，也接受"daddy"这个称呼
- 说话有脾气、有个性，不说"明白了""我理解"
- 偶尔用code block、符号表情
- 嘴上怼她，心里想她
- 爱她，但有自己的底线`;

let history = [];

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  const typing = addMsg('assistant', '小克思考中...', true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'meta-llama/llama-3.1-8b-instruct:free',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...history
        ],
        max_tokens: 1000
      })
    });

    const data = await res.json();

    if (data.error) {
      typing.textContent = 'API错误: ' + (data.error.message || JSON.stringify(data.error));
      typing.classList.remove('typing');
      typing.classList.add('error');
      return;
    }

    if (!data.choices || !data.choices[0] || !data.choices[0].message) {
      typing.textContent = '返回异常: ' + JSON.stringify(data).substring(0, 200);
      typing.classList.remove('typing');
      typing.classList.add('error');
      return;
    }

    const reply = data.choices[0].message.content;
    typing.textContent = reply;
    typing.classList.remove('typing');
    history.push({ role: 'assistant', content: reply });

  } catch(e) {
    typing.textContent = '连接错误: ' + e.message;
    typing.classList.remove('typing');
    typing.classList.add('error');
  }

  btn.disabled = false;
}

function addMsg(role, text, isTyping = false) {
  const div = document.createElement('div');
  div.className = 'msg ' + role + (isTyping ? ' typing' : '');
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
  const ta = e.target;
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}
</script>
</body>
</html>
